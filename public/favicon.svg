<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle (optional, removed for transparent) -->

  <!-- Back document (left, slightly behind) -->
  <path d="M8 10 L8 52 L36 52 L36 18 L28 10 Z" fill="#FFFDE7" stroke="#FFC107" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M28 10 L28 18 L36 18" stroke="#FFC107" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Lines on back doc -->
  <line x1="13" y1="24" x2="31" y2="24" stroke="#FFE082" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="30" x2="28" y2="30" stroke="#FFE082" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="36" x2="31" y2="36" stroke="#FFE082" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="42" x2="25" y2="42" stroke="#FFE082" stroke-width="2" stroke-linecap="round"/>

  <!-- Dashed arrows between docs -->
  <line x1="38" y1="22" x2="46" y2="22" stroke="#FFC107" stroke-width="1.5" stroke-dasharray="2.5,2" stroke-linecap="round"/>
  <polyline points="44,19 47,22 44,25" stroke="#FFC107" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="26" y1="48" x2="18" y2="48" stroke="#FFC107" stroke-width="1.5" stroke-dasharray="2.5,2" stroke-linecap="round"/>
  <polyline points="20,45 17,48 20,51" stroke="#FFC107" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Front document (right, on top) -->
  <path d="M26 14 L26 56 L56 56 L56 22 L48 14 Z" fill="white" stroke="#FFC107" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M48 14 L48 22 L56 22" stroke="#FFC107" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Added line (green) -->
  <circle cx="34" cy="32" r="4.5" fill="#4CAF50"/>
  <line x1="32" y1="32" x2="36" y2="32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="30" x2="34" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39.5" y1="32" x2="52" y2="32" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>

  <!-- Removed line (red) -->
  <circle cx="34" cy="42" r="4.5" fill="#F44336"/>
  <line x1="32" y1="42" x2="36" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="39.5" y1="42" x2="52" y2="42" stroke="#F44336" stroke-width="2" stroke-linecap="round"/>
  <!-- strikethrough on removed line -->
  <line x1="39.5" y1="42" x2="52" y2="42" stroke="#F44336" stroke-width="0.5" stroke-linecap="round"/>

  <!-- Pencil -->
  <g transform="translate(44,46) rotate(-40)">
    <rect x="-3" y="-10" width="6" height="14" rx="1" fill="#FFC107"/>
    <polygon points="-3,4 3,4 0,9" fill="#FF8F00"/>
    <rect x="-3" y="-13" width="6" height="3" rx="1" fill="#FFE082"/>
    <line x1="-3" y1="-10" x2="3" y2="-10" stroke="#FF8F00" stroke-width="0.8"/>
  </g>
</svg>
